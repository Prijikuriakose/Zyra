<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zyra Dress</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
}

.product {
  width: 95%;
  max-width: 400px;
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-sizing: border-box;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}

img {
  width: 100%;
  max-width: 250px;
  height: auto;
  margin-bottom: 15px;
  border-radius: 8px;
}

.size-btn {
  padding: 12px 18px;
  margin: 5px;
  border: 1px solid black;
  cursor: pointer;
  font-size: 16px;
  border-radius: 5px;
  min-width: 60px;
  transition: all 0.2s;
}

.size-btn.selected {
  background-color: black;
  color: white;
}

.size-btn:disabled {
  background-color: #ccc;
  color: #666;
  cursor: not-allowed;
}

input {
  padding: 10px;
  width: 80%;
  max-width: 150px;
  font-size: 16px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  cursor: pointer;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 5px;
  border: none;
}

#scanBtn {
  background: #007bff;
  color: white;
  width: 90%;
  max-width: 250px;
  margin-top: 20px;
}

#listingPrice {
  font-weight: bold;
  margin: 5px 0 15px 0;
  font-size: 16px;
  color: #333;
}

@media (max-width: 420px) {
  .size-btn {
    padding: 10px 12px;
    font-size: 14px;
    min-width: 50px;
  }
  
  input {
    width: 90%;
  }
}
</style>
</head>
<body>

<div class="product">

<h2>Zyra Dress</h2>
<h4>Product ID: <span id="productIdLabel"></span></h4>
<h4>Listing Price: $<span id="listingPrice"></span></h4>

<img src="https://dummyimage.com/300x300/ffc0cb/000&text=Zyra+Dress">

<h4>Select Size</h4>
<div>
  <button class="size-btn" id="sizeS" onclick="selectSize('S')">S</button>
  <button class="size-btn" id="sizeM" onclick="selectSize('M')">M</button>
  <button class="size-btn" id="sizeL" onclick="selectSize('L')">L</button>
  <button class="size-btn" id="sizeXL" onclick="selectSize('XL')">XL</button>
</div>

<h4>Sold Price</h4>
<input type="number" id="soldPrice" placeholder="Enter price">
<br>
<button onclick="markSold()">Mark Sold</button>

<button id="scanBtn" onclick="scanAgain()">
Scan Product Again
</button>

</div>

<script>
// Map of size → productId
const productMap = {
  "S": "100001",
  "M": "100002",
  "L": "100003",
  "XL": "100004"
};

// Map of size → default price
const defaultPriceMap = {
  "S": 50,
  "M": 55,
  "L": 60,
  "XL": 65
};

// Reverse map: productId → size
const reverseMap = Object.entries(productMap).reduce((acc,[size,id])=>{
  acc[id]=size;
  return acc;
},{});

let selectedSize = ""
let productId = ""

// Track sold items in memory
let soldItems = {};

// Read productId from URL and initialize
function getProductId(){
  const params = new URLSearchParams(window.location.search)
  productId = params.get("productId")
  if(!productId) productId = "S"
  document.getElementById("productIdLabel").innerText = productId

  const size = reverseMap[productId] || "S"
  selectedSize = size
  setDefaultPrice(size)
  updateListingPrice(size)
  updateSizeButtons()
}

// Highlight size buttons / disable sold
function updateSizeButtons(){
  const sizes = ["S","M","L","XL"]
  sizes.forEach(s=>{
    const btn = document.getElementById("size"+s)
    if(soldItems[s]){
      btn.disabled = true
      btn.classList.remove("selected")
    } else if(s === selectedSize){
      btn.disabled = false
      btn.classList.add("selected")
    } else {
      btn.disabled = false
      btn.classList.remove("selected")
    }
  })
}

// Size clicked → reload page with new productId
function selectSize(size){
  if(soldItems[size]) return; // Prevent selecting sold size
  selectedSize = size
  const newProductId = productMap[size] || "Unknown"
  window.location.href = window.location.pathname + "?productId=" + newProductId
}

// Set default price in input
function setDefaultPrice(size){
  const price = defaultPriceMap[size] || ""
  document.getElementById("soldPrice").value = price
}

// Update listing price label
function updateListingPrice(size){
  const price = defaultPriceMap[size] || ""
  document.getElementById("listingPrice").innerText = price
}

// Mark sold → disable button
function markSold(){
  const price = document.getElementById("soldPrice").value
  if(selectedSize==""){
    alert("Select size")
    return
  }
  if(price==""){
    alert("Enter sold price")
    return
  }
  alert("Sold Size " + selectedSize + " for $" + price)
  soldItems[selectedSize] = true
  updateSizeButtons()
}

// Scan product again → navigate to scan page
function scanAgain(){
  window.location.href = "https://prijikuriakose.github.io/Zyra/barcode-scanner.html"
}

// Initialize
getProductId()
</script>

</body>
</html>
