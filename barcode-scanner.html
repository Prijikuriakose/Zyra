<!DOCTYPE html>
<html>
<head>

<title>Barcode Scanner</title>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

#scanner{
width:90%;
max-width:420px;
margin:auto;
}

#result{
margin-top:20px;
font-size:22px;
color:green;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:15px;
}

</style>

</head>

<body>

<h2>Scan Barcode</h2>

<div id="scanner"></div>

<div id="result">Waiting for barcode...</div>

<button onclick="startScanner()">Start Scanner</button>

<script>

let lastCode = ""

function startScanner(){

Quagga.init({

inputStream: {
type: "LiveStream",
target: document.querySelector('#scanner'),
constraints: {
facingMode: { ideal: "environment" },  // back camera
width: 640,
height: 480
}
},

decoder: {
readers: [
"ean_reader",
"ean_8_reader",
"upc_reader",
"code_128_reader"
]
}

}, function(err){

if(err){
console.log(err)
return
}

Quagga.start()

})

}

Quagga.onDetected(function(data){

let code = data.codeResult.code

if(code !== lastCode){

lastCode = code

document.getElementById("result").innerHTML =
"Scanned: " + code

// Stop scanner
Quagga.stop()

// Navigate to listing page with product id
window.location.href = "listing.html?productId=" + code

}

})

</script>

</body>
</html>
